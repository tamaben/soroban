<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Soroban Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="ui-layer"></div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. レンダリング環境設定
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, -100, 100);
        camera.position.set(0, 10, 0); camera.lookAt(0, 0, 0);

        // 2. モデル読み込みとマテリアル＆サイズ自動調整
        let clickableObjects = [];
        let columns = [];
        const loader = new GLTFLoader();

        loader.load('soroban.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 15 / Math.max(size.x, size.z);
            model.scale.set(scale, scale, scale);

            const colMap = {};
            model.traverse(c => {
                if (c.isMesh) {
                    clickableObjects.push(c);
                    // マテリアル引き継ぎ
                    const color = c.material.color ? c.material.color.clone() : new THREE.Color(0xffffff);
                    c.material = new THREE.MeshToonMaterial({ color: color, map: c.material.map });
                    
                    // 列管理 (X座標)
                    const colKey = Math.round(c.position.x * scale * 10);
                    if(!colMap[colKey]) colMap[colKey] = [];
                    colMap[colKey].push(c);
                    
                    // 珠の番号 (シェイプキー名 '1'-'4' を探索)
                    if(c.morphTargetDictionary) {
                        for(let i=1; i<=4; i++) {
                            if(c.morphTargetDictionary[i.toString()] !== undefined) c.userData.beadIndex = i;
                        }
                    }
                }
            });
            columns = Object.values(colMap);
            updateCamera(Math.max(size.x, size.z) * scale);
        });

        function updateCamera(frustum) {
            const aspect = window.innerWidth / window.innerHeight;
            const w = frustum * aspect / 2; const h = frustum / 2;
            camera.left = -w; camera.right = w; camera.top = h; camera.bottom = -h;
            camera.updateProjectionMatrix();
        }

        // 3. 連動ロジック
        function syncBeads(mesh, targetCount) {
            const col = columns.find(list => list.includes(mesh));
            if (!col) return;
            col.forEach(bead => {
                const dict = bead.morphTargetDictionary;
                if(!dict) return;
                for (let i = 1; i <= 4; i++) {
                    const idx = dict[i.toString()];
                    if(idx !== undefined) {
                        gsap.to(bead.morphTargetInfluences, { [idx]: (i <= targetCount) ? 1 : 0, duration: 0.2 });
                    }
                }
            });
        }

        // 4. マルチタッチ操作
        const raycaster = new THREE.Raycaster();
        const activePointers = new Map();

        window.addEventListener('pointerdown', (e) => {
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            raycaster.setFromCamera(mouse, camera);
            const inter = raycaster.intersectObjects(clickableObjects, false);
            if(inter.length > 0) {
                const m = inter[0].object;
                activePointers.set(e.pointerId, { mesh: m, startY: e.clientY, initial: getInitialState(m) });
            }
        });

        window.addEventListener('pointermove', e => {
            if(!activePointers.has(e.pointerId)) return;
            const p = activePointers.get(e.pointerId);
            const target = Math.max(0, Math.min(4, p.initial - Math.floor((e.clientY - p.startY)/30)));
            syncBeads(p.mesh, target);
        });

        window.addEventListener('pointerup', e => activePointers.delete(e.pointerId));

        function getInitialState(m) {
            const d = m.morphTargetDictionary, i = m.morphTargetInfluences;
            for(let j=1; j<=4; j++) if(i[d[j.toString()]] > 0.5) return j;
            return 0;
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
