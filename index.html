<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soroban Independent Beads</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, -100, 100);
        camera.position.set(0, 10, 0); camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // 1. 列ごとに珠を管理する配列
        let columns = []; 
        let clickableObjects = [];
        const loader = new GLTFLoader();

        loader.load('soroban.glb', (gltf) => {
            scene.add(gltf.scene);
            const colMap = {};
            
            gltf.scene.traverse(c => {
                if(c.isMesh && c.morphTargetDictionary) {
                    clickableObjects.push(c);
                    // 列を特定 (X座標で判定)
                    const colKey = Math.round(c.position.x * 10);
                    if(!colMap[colKey]) colMap[colKey] = [];
                    colMap[colKey].push(c);

                    // 珠の属性をuserDataに保持
                    // 名前から番号を抽出 (例: "bead_5" -> 5, "bead_3" -> 3)
                    const match = c.name.match(/bead_(\d+)/);
                    if(match) c.userData.targetState = parseInt(match[1]);
                }
            });
            columns = Object.values(colMap);
        });

        // 2. 状態同期ロジック
        function updateColumnState(clickedMesh, targetState) {
            const col = columns.find(list => list.includes(clickedMesh));
            if(!col) return;

            col.forEach(bead => {
                const dict = bead.morphTargetDictionary;
                const infl = bead.morphTargetInfluences;
                if(!dict) return;

                // 各珠のターゲット番号と一致するキーだけを最大(1)にし、他を(0)にする
                const myState = bead.userData.targetState;
                if(myState !== undefined) {
                    const targetVal = (myState === targetState) ? 1 : 0;
                    const idx = dict[myState.toString()];
                    if(idx !== undefined) {
                        gsap.to(infl, { [idx]: targetVal, duration: 0.2, ease: "power2.out" });
                    }
                }
            });
        }

        // 3. 操作
        const raycaster = new THREE.Raycaster();
        window.addEventListener('pointerdown', (e) => {
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            raycaster.setFromCamera(mouse, camera);
            const inter = raycaster.intersectObjects(clickableObjects, false);
            if(inter.length > 0) {
                const m = inter[0].object;
                if(m.userData.targetState !== undefined) {
                    updateColumnState(m, m.userData.targetState);
                }
            }
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
