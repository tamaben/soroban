<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soroban Fullscreen</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. カメラ設定（画面いっぱいにするための調整）
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
        camera.position.set(0, 10, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // 2. モデル読み込みと自動フィット
        let clickableObjects = [];
        const loader = new GLTFLoader();
        loader.load('soroban.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);
            
            // モデル全体を画面に合わせる（サイズ調整）
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.z);
            const scale = 15 / maxDim; // ここでサイズを調整
            model.scale.set(scale, scale, scale);

            model.traverse(c => {
                if(c.isMesh) {
                    clickableObjects.push(c);
                    // 珠の番号を自動判別 (名前が "bead_1" などの場合)
                    const match = c.name.match(/bead_(\d+)/);
                    if(match) c.userData.beadIndex = parseInt(match[1]);
                    // もし名前が違う場合は、ここを c.name.includes('1') などに変更してください
                }
            });
            updateCamera(maxDim);
        });

        function updateCamera(maxDim) {
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = maxDim * 1.2; // 少し余裕を持たせる
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
        }

        // 3. 操作ロジック
        const raycaster = new THREE.Raycaster();
        window.addEventListener('pointerdown', (e) => {
            const mouse = new THREE.Vector2(
                (e.clientX / window.innerWidth) * 2 - 1,
                -(e.clientY / window.innerHeight) * 2 + 1
            );
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects, false);
            
            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                // クリックされたら、親グループの珠をすべて連動させる
                const index = mesh.userData.beadIndex || 1; 
                syncBeads(mesh, index);
            }
        });

        function syncBeads(mesh, targetIndex) {
            // 親(または同じグループ)を特定して動かす
            const targetGroup = mesh.parent;
            targetGroup.traverse(sibling => {
                if (sibling.isMesh && sibling.morphTargetDictionary) {
                    // targetIndexまでを上げ、それ以外を下げる
                    const targetValue = (sibling.userData.beadIndex <= targetIndex) ? 1 : 0;
                    Object.values(sibling.morphTargetDictionary).forEach(idx => {
                        gsap.to(sibling.morphTargetInfluences, { [idx]: targetValue, duration: 0.2 });
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
