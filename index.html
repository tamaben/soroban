<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Soroban Mirror</title>
    <style>
        @font-face { font-family: 'ABACUS2'; src: url('ABACUS2.ttf') format('truetype'); }
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(255,255,255,0.9); }
        .ui-btn { font-size: 1.5rem; padding: 20px 40px; margin: 10px; border-radius: 12px; border: none; cursor: pointer; color: white; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="overlay">
        <button id="btn-main" class="ui-btn" style="background:#4299e1;">💻 先生画面</button>
        <button id="btn-sub" class="ui-btn" style="background:#48bb78;">📱 生徒操作</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 設定
        let role = null, peer = null, connection = null;
        const clickableObjects = [];
        const columns = [];
        const activePointers = new Map();

        // Scene
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, -100, 100);
        camera.position.set(0, 10, 0); camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // Load
        new GLTFLoader().load('soroban.glb', (gltf) => {
            scene.add(gltf.scene);
            const colMap = {};
            gltf.scene.traverse(c => {
                if(c.isMesh) {
                    clickableObjects.push(c);
                    const colKey = Math.round(c.position.x * 5);
                    if(!colMap[colKey]) colMap[colKey] = [];
                    colMap[colKey].push(c);
                    const match = c.name.match(/bead_(\d+)/);
                    if(match) c.userData.beadIndex = parseInt(match[1]);
                }
            });
            Object.values(colMap).forEach(list => columns.push(list));
            updateCamera();
        });

        function updateCamera() {
            const aspect = window.innerWidth / window.innerHeight;
            const frustum = 15;
            camera.left = -frustum * aspect / 2; camera.right = frustum * aspect / 2;
            camera.top = frustum / 2; camera.bottom = -frustum / 2;
            camera.updateProjectionMatrix();
        }

        // Logic
        function syncBeads(mesh, targetIndex) {
            const col = columns.find(list => list.includes(mesh));
            if(!col) return;
            col.forEach(bead => {
                const targetValue = (bead.userData.beadIndex <= targetIndex) ? 1 : 0;
                Object.values(bead.morphTargetDictionary).forEach(idx => {
                    gsap.to(bead.morphTargetInfluences, { [idx]: targetValue, duration: 0.2 });
                });
            });
            if(connection && role === 'sub') connection.send({ type: 'sync', state: getBoardState() });
        }

        function getBoardState() {
            const s = {};
            clickableObjects.forEach((m, i) => s[i] = [...m.morphTargetInfluences]);
            return s;
        }

        // Pointer
        const raycaster = new THREE.Raycaster();
        window.addEventListener('pointerdown', e => {
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            raycaster.setFromCamera(mouse, camera);
            const inter = raycaster.intersectObjects(clickableObjects, false);
            if(inter.length > 0) {
                const m = inter[0].object;
                activePointers.set(e.pointerId, { mesh: m, startY: e.clientY, initial: getMeshState(m) });
            }
        });

        window.addEventListener('pointermove', e => {
            if(!activePointers.has(e.pointerId)) return;
            const p = activePointers.get(e.pointerId);
            const target = Math.max(0, Math.min(4, p.initial - Math.floor((e.clientY - p.startY)/30)));
            syncBeads(p.mesh, target);
        });

        function getMeshState(m) {
            const i = m.morphTargetInfluences;
            if('5' in m.morphTargetDictionary) return i[m.morphTargetDictionary['5']] > 0.5 ? 1 : 0;
            for(let j=1; j<=4; j++) if(m.userData.beadIndex === j && i[m.morphTargetDictionary[j.toString()]] > 0.5) return j;
            return 0;
        }

        // Network
        document.getElementById('btn-main').onclick = () => {
            role = 'main'; document.getElementById('overlay').style.display = 'none';
            peer = new Peer();
            peer.on('open', id => document.getElementById('status').innerText = "ID: " + id);
            peer.on('connection', conn => {
                connection = conn;
                conn.on('data', d => {
                    Object.keys(d.state).forEach((idx, i) => gsap.to(clickableObjects[idx].morphTargetInfluences, { ...d.state[idx], duration: 0.1 }));
                });
            });
        };

        document.getElementById('btn-sub').onclick = () => {
            role = 'sub'; document.getElementById('status').innerHTML = '<input id="i"><button onclick="connect()">Connect</button>';
        };
        window.connect = () => {
            connection = new Peer().connect(document.getElementById('i').value);
            document.getElementById('overlay').style.display = 'none';
        };

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
