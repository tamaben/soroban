<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Soroban Robust Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #debug { position: absolute; top: 10px; left: 10px; color: red; pointer-events: none; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <div id="debug"></div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-10, 10, 10, -10, -100, 100);
        camera.position.set(0, 10, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        let columns = []; // 珠を列ごとに管理する配列
        const loader = new GLTFLoader();
        
        loader.load('soroban.glb', (gltf) => {
            scene.add(gltf.scene);
            
            // 珠を列ごとに分類
            gltf.scene.traverse(c => {
                if(c.isMesh && c.morphTargetDictionary) {
                    // X座標で列を判定
                    const colKey = Math.round(c.position.x * 10); 
                    if(!columns[colKey]) columns[colKey] = [];
                    columns[colKey].push(c);

                    // 珠の番号を名前から取得 (bead_1, bead_2...)
                    const match = c.name.match(/bead_(\d+)/);
                    if(match) c.userData.beadIndex = parseInt(match[1]);
                }
            });
            // 空の要素を除去
            columns = Object.values(columns);
        });

        const raycaster = new THREE.Raycaster();

        window.addEventListener('pointerdown', (e) => {
            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            if(intersects.length > 0) {
                const mesh = intersects[0].object;
                if(mesh.userData.beadIndex !== undefined) {
                    syncColumn(mesh);
                }
            }
        });

        function syncColumn(clickedMesh) {
            // クリックした珠がどの列にあるか探す
            const col = columns.find(list => list.includes(clickedMesh));
            if(!col) return;

            const targetIndex = clickedMesh.userData.beadIndex;
            
            // 同じ列の珠をすべて同期
            col.forEach(bead => {
                const dict = bead.morphTargetDictionary;
                const infl = bead.morphTargetInfluences;
                
                // beadIndex が targetIndex 以下なら上げる(1)、そうでなければ下げる(0)
                const targetValue = (bead.userData.beadIndex <= targetIndex) ? 1 : 0;
                
                Object.values(dict).forEach(idx => {
                    gsap.to(infl, { [idx]: targetValue, duration: 0.2 });
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
