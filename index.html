<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Soroban Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. シーンと正射影カメラの設定（ニア/ファーを広く設定）
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-10, 10, 10, -10, 0.1, 1000);
        camera.position.set(0, 10, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // レイキャスターの設定
        const raycaster = new THREE.Raycaster();
        let clickableObjects = [];

        // 2. モデルロード
        const loader = new GLTFLoader();
        loader.load('soroban.glb', (gltf) => {
            scene.add(gltf.scene);
            gltf.scene.traverse(c => {
                if(c.isMesh) {
                    clickableObjects.push(c);
                    // 命名規則判定
                    const match = c.name.match(/bead_(\d+)/);
                    if(match) c.userData.beadIndex = parseInt(match[1]);
                }
            });
        });

        // 3. 操作ロジックの修正
        const activePointers = new Map();

        window.addEventListener('pointerdown', (e) => {
            // 正規化されたマウス座標をカメラに合わせる
            const mouse = new THREE.Vector2(
                (e.clientX / window.innerWidth) * 2 - 1,
                -(e.clientY / window.innerHeight) * 2 + 1
            );
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects, false);
            
            if (intersects.length > 0) {
                activePointers.set(e.pointerId, {
                    mesh: intersects[0].object,
                    startY: e.clientY,
                    initial: getMeshState(intersects[0].object)
                });
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!activePointers.has(e.pointerId)) return;
            const p = activePointers.get(e.pointerId);
            const deltaY = e.clientY - p.startY;
            const threshold = 30;
            const dict = p.mesh.morphTargetDictionary, infl = p.mesh.morphTargetInfluences;

            if (dict) {
                if ('5' in dict) {
                    infl[dict['5']] = deltaY > threshold ? 1 : 0;
                } else if ('1' in dict) {
                    let newState = Math.max(0, Math.min(4, p.initial - Math.floor(deltaY / threshold)));
                    syncBeads(p.mesh, newState);
                }
            }
        });

        window.addEventListener('pointerup', (e) => activePointers.delete(e.pointerId));

        // 珠の連動
        function syncBeads(mesh, targetIndex) {
            const parent = mesh.parent;
            parent.traverse(sibling => {
                if (sibling.isMesh && sibling.userData.beadIndex) {
                    const targetValue = (sibling.userData.beadIndex <= targetIndex) ? 1 : 0;
                    Object.values(sibling.morphTargetDictionary).forEach(idx => {
                        gsap.to(sibling.morphTargetInfluences, { [idx]: targetValue, duration: 0.2 });
                    });
                }
            });
        }

        function getMeshState(m) {
            const d = m.morphTargetDictionary, i = m.morphTargetInfluences;
            if (!d) return 0;
            if ('5' in d) return i[d['5']] > 0.5 ? 1 : 0;
            for (let j = 1; j <= 4; j++) if (j.toString() in d && i[d[j.toString()]] > 0.5) return j;
            return 0;
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
