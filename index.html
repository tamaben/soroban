<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top-Down Soroban</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. 真上からのカメラ設定 (OrthographicCamera)
        const scene = new THREE.Scene();
        // ニア/ファーを大きくして確実に見えるように設定
        const camera = new THREE.OrthographicCamera(-10, 10, 10, -10, -100, 100);
        camera.position.set(0, 10, 0); // 真上
        camera.lookAt(0, 0, 0);       // 下を見る

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // 2. 列ごとの珠管理リスト
        let columns = []; 
        const loader = new GLTFLoader();
        
        loader.load('soroban.glb', (gltf) => {
            scene.add(gltf.scene);
            
            // X座標で列を判別してグルーピング
            const colMap = {};
            gltf.scene.traverse(c => {
                if(c.isMesh && c.morphTargetDictionary) {
                    // X座標をキーにして列を特定 (精度を落として同じ列をまとめる)
                    const colKey = Math.round(c.position.x * 5); 
                    if(!colMap[colKey]) colMap[colKey] = [];
                    colMap[colKey].push(c);

                    // 珠の番号（下から1, 2, 3, 4）を名前に基づき判定
                    // 「bead_1」や「1」という名前が含まれている前提
                    const match = c.name.match(/(\d+)/);
                    if(match) c.userData.beadIndex = parseInt(match[1]);
                }
            });
            columns = Object.values(colMap);
        });

        // 3. 操作ロジック (真上からのクリックを変換)
        const raycaster = new THREE.Raycaster();
        
        window.addEventListener('pointerdown', (e) => {
            // マウス座標を真上からの視点に合わせる
            const mouse = new THREE.Vector2(
                (e.clientX / window.innerWidth) * 2 - 1,
                -(e.clientY / window.innerHeight) * 2 + 1
            );
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            if(intersects.length > 0) {
                const mesh = intersects[0].object;
                if(mesh.userData.beadIndex !== undefined) {
                    syncColumn(mesh);
                }
            }
        });

        function syncColumn(clickedMesh) {
            // クリックされた珠がどの列にあるか探す
            const col = columns.find(list => list.includes(clickedMesh));
            if(!col) return;

            const targetIndex = clickedMesh.userData.beadIndex;
            
            // その列の珠をすべて連動
            col.forEach(bead => {
                if(bead.morphTargetDictionary) {
                    // targetIndex以下の珠は上げる(1)、以上は下げる(0)
                    const targetValue = (bead.userData.beadIndex <= targetIndex) ? 1 : 0;
                    
                    Object.values(bead.morphTargetDictionary).forEach(idx => {
                        gsap.to(bead.morphTargetInfluences, {
                            [idx]: targetValue,
                            duration: 0.2,
                            ease: "power2.out"
                        });
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
