<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3Dそろばん：連動スライド操作</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-10, 10, 10, -10, 0.1, 100);
        camera.position.set(0, 10, 0); camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        
        let clickableObjects = [];
        const loader = new GLTFLoader();

        loader.load('soroban.glb', (gltf) => {
            scene.add(gltf.scene);
            gltf.scene.traverse(c => {
                if(c.isMesh && c.morphTargetDictionary) {
                    // ★重要：Blenderでの命名規則から珠の番号を自動取得
                    // 例: 珠の名前に "bead_1", "bead_2" 等が入っている想定
                    const match = c.name.match(/bead_(\d+)/);
                    if(match) c.userData.beadIndex = parseInt(match[1]);
                    clickableObjects.push(c);
                }
            });
        });

        // ==========================================
        // 連動操作ロジック
        // ==========================================
        function syncBeads(mesh, targetIndex) {
            // このメッシュと同じ列にある他の珠も制御する必要があるため、
            // 実際には「列」単位でメッシュを管理するのが一番スムーズです。
            // ここでは簡易的に、同じ親を持つグループを探して連動させます。
            const parent = mesh.parent;
            parent.traverse(sibling => {
                if (sibling.isMesh && sibling.morphTargetDictionary && sibling.userData.beadIndex) {
                    const dict = sibling.morphTargetDictionary;
                    const infl = sibling.morphTargetInfluences;
                    
                    // クリックした位置までを上げる(1)、それ以外を下げる(0)
                    const targetValue = (sibling.userData.beadIndex <= targetIndex) ? 1 : 0;
                    
                    // すべてのシェイプキーをこのターゲット値に同期
                    Object.values(dict).forEach(idx => {
                        gsap.to(infl, { [idx]: targetValue, duration: 0.2, ease: "power2.out" });
                    });
                }
            });
        }

        // ==========================================
        // クリック操作
        // ==========================================
        const raycaster = new THREE.Raycaster();
        window.addEventListener('pointerdown', (e) => {
            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects, false);
            
            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                const index = clickedMesh.userData.beadIndex;
                if(index) syncBeads(clickedMesh, index);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
